name: Deploy Switch Frontend

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Servicio Switch Frontend a desplegar"
        required: true
        default: "sw-frontend"

  repository_dispatch:
    types: [deploy-switch-front]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy Switch Frontend service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VM_USER }}/banquito-infra
            SERVICE="${{ github.event.client_payload.service || github.event.inputs.service }}"
            bash scripts/deploy-switch-front.sh "$SERVICE"

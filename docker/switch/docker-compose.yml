services:
  banquito-sw-enrutamiento:
    image: ${DOCKER_USERNAME:-andrescarrillo2001}/banquito-sw-enrutamiento:latest
    container_name: banquito-sw-enrutamiento
    ports:
      - "8014:8014"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8014
    env_file:
      - .env
      - .env.enrutamiento
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8014/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  banquito-sw-facturacion:

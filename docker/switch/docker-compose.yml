      - banquito-sw-enrutamiento
      - banquito-sw-facturacion
      - banquito-sw-lotes
      - banquito-sw-pagos-internos
      #- banquito-sw-pagos-externos
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  banquito:
    driver: bridge

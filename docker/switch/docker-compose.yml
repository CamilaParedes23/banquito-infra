version: '3.8'

services:
  # Switch Backend Services
  banquito-sw-enrutamiento:
    image: ${DOCKER_USERNAME:-andrescarrillo2001}/banquito-sw-enrutamiento:latest
    container_name: banquito-sw-enrutamiento
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8086
    env_file:
      - .env
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8086/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  banquito-sw-facturacion:
    image: ${DOCKER_USERNAME:-andrescarrillo2001}/banquito-sw-facturacion:latest
    container_name: banquito-sw-facturacion

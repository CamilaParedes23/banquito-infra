version: '3.8'

services:
  # Core Backend Services
  core-ventanilla:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-ventanilla:latest
    container_name: banquito-core-ventanilla
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8081
    env_file:
      - .env
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  core-contable:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-contable:latest
    container_name: banquito-core-contable
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8082
    env_file:
      - .env
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  core-admin:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-admin:latest
    container_name: banquito-core-admin
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8083
    env_file:
      - .env
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  core-clientes:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-clientes:latest
    container_name: banquito-core-clientes
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8084
    env_file:
      - .env
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8084/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  core-transaccional:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-transaccional:latest
    container_name: banquito-core-transaccional
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8085
    env_file:
      - .env
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8085/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  core-api-gateway:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-api-gateway:latest
    container_name: banquito-core-api-gateway
    ports:
      - "8090:8090"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8090
    env_file:
      - .env
    networks:
      - banquito
    restart: unless-stopped
    depends_on:
      - core-ventanilla
      - core-contable
      - core-admin
      - core-clientes
      - core-transaccional
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8090/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  banquito:
    driver: bridge

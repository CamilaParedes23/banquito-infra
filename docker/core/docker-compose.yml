name: banquito-core-v2-cloud

# Compose para despliegue en nube usando imágenes publicadas en DockerHub.
# Reglas de uso:
# 1) No usar docker compose build para estos servicios.
# 2) Usar docker compose pull antes de up.
# 3) Usar BANQUITO_IMAGE_TAG fijo, no latest, para releases cerrados.
# 4) No ejecutar down -v salvo que se quiera borrar datos/volúmenes locales.

services:
  mailpit:
    image: axllent/mailpit:v1.20
    container_name: banquito-mailpit
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/Guayaquil}
      MP_MAX_MESSAGES: ${MAILPIT_MAX_MESSAGES:-5000}
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - banquito-net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8025/api/v1/info" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    env_file:
      - ./.env

  identity-access-service:
    image: andrescarrillo2001/banquito-core-seguridad:${BANQUITO_IMAGE_TAG:-prod}
    container_name: banquito-identity-access-service
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/Guayaquil}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_APPLICATION_NAME: identity-access-service
      SERVER_PORT: 8081
      APP_TIMEZONE: ${TZ:-America/Guayaquil}

      IDENTITY_DB_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:-3306}/${IDENTITY_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci
      IDENTITY_DB_USER: ${MYSQL_USER}
      IDENTITY_DB_PASSWORD: ${MYSQL_PASSWORD}

      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-15}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-7}

      DEMO_DATA_ENABLED: ${IDENTITY_DEMO_DATA_ENABLED:-true}
      DEMO_PASSWORD: ${IDENTITY_DEMO_PASSWORD:-password}

      ADMIN_SERVICE_BASE_URL: http://core-admin-service:8083
      NOTIFICATION_SERVICE_BASE_URL: http://notification-service:8087
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}

      IDENTITY_OUTBOX_ENABLED: ${IDENTITY_OUTBOX_ENABLED:-true}
      IDENTITY_OUTBOX_FIXED_DELAY_MS: ${IDENTITY_OUTBOX_FIXED_DELAY_MS:-5000}
      IDENTITY_OUTBOX_BATCH_SIZE: ${IDENTITY_OUTBOX_BATCH_SIZE:-20}
      IDENTITY_OUTBOX_MAX_ATTEMPTS: ${IDENTITY_OUTBOX_MAX_ATTEMPTS:-5}

      # URL pública del frontend donde el cliente activa su cuenta.
      # Ejemplo en .env:
      # BANQUITO_CUSTOMER_ACTIVATION_BASE_URL=http://34.42.234.78:3001/activar
      BANQUITO_CUSTOMER_ACTIVATION_BASE_URL: ${BANQUITO_CUSTOMER_ACTIVATION_BASE_URL}

      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-true}
      FLYWAY_BASELINE_VERSION: ${FLYWAY_BASELINE_VERSION:-1}

      ACTUATOR_ENDPOINTS: ${ACTUATOR_ENDPOINTS:-health,info}
      ACTUATOR_HEALTH_DETAILS: ${ACTUATOR_HEALTH_DETAILS:-always}
      OPENAPI_DOCS_PATH: ${OPENAPI_DOCS_PATH:-/api-docs}
      SWAGGER_UI_PATH: ${SWAGGER_UI_PATH:-/swagger-ui.html}
    ports:
      - "${IDENTITY_HTTP_PORT:-8081}:8081"
    depends_on:
      mailpit:
        condition: service_started
    networks:
      - banquito-net
    env_file:
      - ./.env

  core-customer-service:
    image: andrescarrillo2001/banquito-core-clientes:${BANQUITO_IMAGE_TAG:-prod}
    container_name: banquito-core-customer-service
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/Guayaquil}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_APPLICATION_NAME: core-customer-service
      SERVER_PORT: 8082
      APP_TIME_ZONE: ${TZ:-America/Guayaquil}

      CUSTOMER_DB_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:-3306}/${CUSTOMER_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci
      CUSTOMER_DB_USER: ${MYSQL_USER}
      CUSTOMER_DB_PASSWORD: ${MYSQL_PASSWORD}

      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}

      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      HIBERNATE_FORMAT_SQL: ${HIBERNATE_FORMAT_SQL:-false}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-true}
      FLYWAY_BASELINE_VERSION: ${FLYWAY_BASELINE_VERSION:-1}
      DEMO_DATA_ENABLED: ${CUSTOMER_DEMO_DATA_ENABLED:-false}

      GRPC_SERVER_PORT: 9092
      ACTUATOR_EXPOSURE: ${ACTUATOR_EXPOSURE:-health,info}
      ACTUATOR_HEALTH_SHOW_DETAILS: ${ACTUATOR_HEALTH_SHOW_DETAILS:-always}
      OPENAPI_DOCS_PATH: ${OPENAPI_DOCS_PATH:-/api-docs}
      SWAGGER_UI_PATH: ${SWAGGER_UI_PATH:-/swagger-ui.html}
    ports:
      - "${CUSTOMER_HTTP_PORT:-8082}:8082"
      - "${CUSTOMER_GRPC_PORT:-9092}:9092"
    networks:
      - banquito-net
    env_file:
      - ./.env

  core-admin-service:
    image: andrescarrillo2001/banquito-core-admin:${BANQUITO_IMAGE_TAG:-prod}
    container_name: banquito-core-admin-service
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/Guayaquil}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_APPLICATION_NAME: core-admin-service
      SERVER_PORT: 8083
      APP_TIME_ZONE: ${TZ:-America/Guayaquil}

      ADMIN_DB_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:-3306}/${ADMIN_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci
      ADMIN_DB_USER: ${MYSQL_USER}
      ADMIN_DB_PASSWORD: ${MYSQL_PASSWORD}

      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}

      DEMO_DATA_ENABLED: ${ADMIN_DEMO_DATA_ENABLED:-true}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-true}
      FLYWAY_BASELINE_VERSION: ${FLYWAY_BASELINE_VERSION:-1}
      HIBERNATE_DDL_AUTO: ${HIBERNATE_DDL_AUTO:-validate}
      HIBERNATE_FORMAT_SQL: ${HIBERNATE_FORMAT_SQL:-false}
      MANAGEMENT_HEALTH_DETAILS: ${MANAGEMENT_HEALTH_DETAILS:-always}

      GRPC_SERVER_PORT: 9093
    ports:
      - "${ADMIN_HTTP_PORT:-8083}:8083"
      - "${ADMIN_GRPC_PORT:-9093}:9093"
    networks:
      - banquito-net
    env_file:
      - ./.env

  core-accounting-service:
    image: andrescarrillo2001/banquito-core-contable:${BANQUITO_IMAGE_TAG:-prod}
    container_name: banquito-core-accounting-service
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/Guayaquil}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_APPLICATION_NAME: core-accounting-service
      SERVER_PORT: 8084
      APP_TIMEZONE: ${TZ:-America/Guayaquil}

      ACCOUNTING_DB_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:-3306}/${ACCOUNTING_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci
      ACCOUNTING_DB_USER: ${MYSQL_USER}
      ACCOUNTING_DB_PASSWORD: ${MYSQL_PASSWORD}

      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}

      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-true}
      FLYWAY_BASELINE_VERSION: ${FLYWAY_BASELINE_VERSION:-1}

      ACTUATOR_ENDPOINTS: ${ACTUATOR_ENDPOINTS:-health,info}
      ACTUATOR_HEALTH_DETAILS: ${ACTUATOR_HEALTH_DETAILS:-always}
      OPENAPI_DOCS_PATH: ${OPENAPI_DOCS_PATH:-/api-docs}
      SWAGGER_UI_PATH: ${SWAGGER_UI_PATH:-/swagger-ui.html}

      ACCOUNTING_DEFAULT_CUTOFF_TIME: ${ACCOUNTING_DEFAULT_CUTOFF_TIME:-20:00:00}
      ACCOUNTING_REPORT_DIRECTORY: /reports/eod
      DOCUMENT_SERVICE_URL: http://document-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087

      DB_MAX_POOL_SIZE: ${DB_MAX_POOL_SIZE:-10}
      DB_MIN_IDLE: ${DB_MIN_IDLE:-2}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-30000}
      HIBERNATE_FORMAT_SQL: ${HIBERNATE_FORMAT_SQL:-false}

      GRPC_SERVER_PORT: 9094
    volumes:
      - accounting_reports_data:/reports/eod
    ports:
      - "${ACCOUNTING_HTTP_PORT:-8084}:8084"
      - "${ACCOUNTING_GRPC_PORT:-9094}:9094"
    networks:
      - banquito-net
    env_file:
      - ./.env

  document-service:
    image: andrescarrillo2001/banquito-core-documentos:${BANQUITO_IMAGE_TAG:-prod}
    container_name: banquito-document-service
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/Guayaquil}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_APPLICATION_NAME: document-service
      SERVER_PORT: 8086

      MONGODB_URI: ${MONGODB_URI}

      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}

      DOCUMENT_DEMO_ENABLED: ${DOCUMENT_DEMO_ENABLED:-true}
      ACTUATOR_EXPOSURE: ${ACTUATOR_EXPOSURE:-health,info}
      ACTUATOR_HEALTH_DETAILS: ${ACTUATOR_HEALTH_DETAILS:-always}

      LOG_LEVEL_ROOT: INFO
      LOG_LEVEL_APP: INFO

      DOCUMENT_GRPC_PORT: 9096
      DOCUMENT_STORAGE_MODE: ${DOCUMENT_STORAGE_MODE:-MONGODB_PAYLOAD}
      DOCUMENT_STORAGE_BASE_PATH: /documents
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
    ports:
      - "${DOCUMENT_HTTP_PORT:-8086}:8086"
      - "${DOCUMENT_GRPC_PORT:-9096}:9096"
    networks:
      - banquito-net
    env_file:
      - ./.env

  notification-service:
    image: andrescarrillo2001/banquito-core-notificacion:${BANQUITO_IMAGE_TAG:-prod}
    container_name: banquito-notification-service
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/Guayaquil}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_APPLICATION_NAME: notification-service
      SERVER_PORT: 8087

      NOTIFICATION_DB_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:-3306}/${NOTIFICATION_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci
      NOTIFICATION_DB_USERNAME: ${MYSQL_USER}
      NOTIFICATION_DB_USER: ${MYSQL_USER}
      NOTIFICATION_DB_PASSWORD: ${MYSQL_PASSWORD}

      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}

      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-true}
      FLYWAY_BASELINE_VERSION: ${FLYWAY_BASELINE_VERSION:-1}

      NOTIFICATION_DELIVERY_MODE: ${NOTIFICATION_DELIVERY_MODE:-SMTP}
      NOTIFICATION_PROVIDER: ${NOTIFICATION_PROVIDER:-SMTP}
      SMTP_FROM: ${SMTP_FROM:-no-reply@banquito.com}
      SMTP_REPLY_TO: ${SMTP_REPLY_TO:-}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE:-false}

      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      NOTIFICATION_GRPC_PORT: 9097

      ACTUATOR_ENDPOINTS: ${ACTUATOR_ENDPOINTS:-health,info}
      ACTUATOR_HEALTH_DETAILS: ${ACTUATOR_HEALTH_DETAILS:-always}
    ports:
      - "${NOTIFICATION_HTTP_PORT:-8087}:8087"
      - "${NOTIFICATION_GRPC_PORT:-9097}:9097"
    depends_on:
      mailpit:
        condition: service_started
    networks:
      - banquito-net
    env_file:
      - ./.env

  core-account-service:
    image: andrescarrillo2001/banquito-core-transaccional:${BANQUITO_IMAGE_TAG:-prod}
    container_name: banquito-core-account-service
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/Guayaquil}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_APPLICATION_NAME: core-account-service
      SERVER_PORT: 8085
      APP_TIMEZONE: ${TZ:-America/Guayaquil}

      ACCOUNT_DB_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:-3306}/${ACCOUNT_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci
      ACCOUNT_DB_USER: ${MYSQL_USER}
      ACCOUNT_DB_PASSWORD: ${MYSQL_PASSWORD}

      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}

      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-true}
      FLYWAY_BASELINE_VERSION: ${FLYWAY_BASELINE_VERSION:-1}

      ACTUATOR_ENDPOINTS: ${ACTUATOR_ENDPOINTS:-health,info}
      ACTUATOR_HEALTH_DETAILS: ${ACTUATOR_HEALTH_DETAILS:-always}
      OPENAPI_DOCS_PATH: ${OPENAPI_DOCS_PATH:-/api-docs}
      SWAGGER_UI_PATH: ${SWAGGER_UI_PATH:-/swagger-ui.html}

      DB_MAX_POOL_SIZE: ${DB_MAX_POOL_SIZE:-10}
      DB_MIN_IDLE: ${DB_MIN_IDLE:-2}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-30000}
      HIBERNATE_FORMAT_SQL: ${HIBERNATE_FORMAT_SQL:-false}

      CUSTOMER_GRPC_HOST: core-customer-service
      CUSTOMER_GRPC_PORT: 9092
      ADMIN_GRPC_HOST: core-admin-service
      ADMIN_GRPC_PORT: 9093
      ACCOUNTING_GRPC_HOST: core-accounting-service
      ACCOUNTING_GRPC_PORT: 9094
      NOTIFICATION_GRPC_HOST: notification-service
      NOTIFICATION_GRPC_PORT: 9097
      DOCUMENT_GRPC_HOST: document-service
      DOCUMENT_GRPC_PORT: 9096

      INTERNAL_GRPC_TIMEOUT_MS: ${INTERNAL_GRPC_TIMEOUT_MS:-10000}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}

      P2P_IDEMPOTENCY_REQUIRED: ${P2P_IDEMPOTENCY_REQUIRED:-false}
      IDEMPOTENCY_TTL_HOURS: ${IDEMPOTENCY_TTL_HOURS:-24}

      OUTBOX_DISPATCH_ENABLED: ${OUTBOX_DISPATCH_ENABLED:-true}
      OUTBOX_DISPATCH_FIXED_DELAY_MS: ${OUTBOX_DISPATCH_FIXED_DELAY_MS:-5000}
      OUTBOX_DISPATCH_BATCH_SIZE: ${OUTBOX_DISPATCH_BATCH_SIZE:-20}
      OUTBOX_DISPATCH_MAX_ATTEMPTS: ${OUTBOX_DISPATCH_MAX_ATTEMPTS:-5}

      RECENT_TRANSACTIONS_LIMIT: ${RECENT_TRANSACTIONS_LIMIT:-20}
      ACCOUNTING_DATE_SOURCE: ${ACCOUNTING_DATE_SOURCE:-local}
    ports:
      - "${ACCOUNT_HTTP_PORT:-8085}:8085"
    depends_on:
      core-customer-service:
        condition: service_started
      core-admin-service:
        condition: service_started
      core-accounting-service:
        condition: service_started
      document-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - banquito-net
    env_file:
      - ./.env

networks:
  banquito-net:
    external: true
    name: banquito-net

volumes:
  accounting_reports_data: {}

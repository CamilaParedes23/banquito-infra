services:
  banquito-core-contable:
    image: ${DOCKER_USERNAME:-andrescarrillo2001}/banquito-core-contable:latest
    container_name: banquito-core-contable
    ports:
      - "8007:8007"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8007
    env_file:
      - .env
      - .env.contable
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8007/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  banquito-core-admin:

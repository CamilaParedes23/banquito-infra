version: '3.8'

# Master docker-compose para orquestar todos los servicios de Banquito
# Nota: Este archivo es opcional, puedes usar los compose individuales por subsistema

services:
  # ============================================
  # CORE BACKEND SERVICES (Puerto 8081-8090)
  # ============================================
  
  core-contable:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-contable:latest
    container_name: banquito-core-contable
    ports:
      - "8007:8007"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8007
    env_file:
      - docker/core/.env
      - docker/core/.env.contable
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8007/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  core-admin:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-admin:latest
    container_name: banquito-core-admin
    ports:
      - "8008:8008"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8008
    env_file:
      - docker/core/.env
      - docker/core/.env.admin
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8008/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  core-clientes:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-clientes:latest
    container_name: banquito-core-clientes
    ports:
      - "8009:8009"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8009

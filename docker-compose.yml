      test: [ "CMD", "curl", "-f", "http://localhost:8013/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3


  # ============================================
  # CORE FRONTEND SERVICES (Puerto 3000-3001)
  # ============================================

  core-banca-web:
    image: ${DOCKER_USERNAME:-andrescarrillo2001}/banquito-core-bancaweb-fronend:latest
    container_name: banquito-core-banca-web
    ports:
      - "3000:3000"
    env_file:
      - docker/core-frontend/.env
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3

  core-ventanilla-frontend:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-ventanilla-frontend:latest
    container_name: banquito-core-ventanilla-frontend
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://localhost:8090
    env_file:
      - docker/core-frontend/.env
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:

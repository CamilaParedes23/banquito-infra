    ports:
      - "8011:8011"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8011
    env_file:
      - docker/core/.env
      - docker/core/.env.notificacion
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8011/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  core-seguridad:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-seguridad:latest
    container_name: banquito-core-seguridad
    ports:
      - "8012:8012"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8012
    env_file:
      - docker/core/.env
      - docker/core/.env.seguridad
    networks:
      - banquito
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8012/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  core-documentos:
    image: ${DOCKER_USERNAME:-banquito}/banquito-core-documentos:latest
    container_name: banquito-core-documentos

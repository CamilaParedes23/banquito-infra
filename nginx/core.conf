upstream core_backend {
    server localhost:8090;
}

upstream core_banca_web {
    server localhost:3000;
}

upstream core_ventanilla_frontend {
    server localhost:3001;
}

server {
    listen 80;
    server_name core-api.banquito.local api.banquito.local;
    client_max_body_size 100M;

    location / {
        proxy_pass http://core_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Health check endpoint
    location /actuator/health {
        access_log off;
        proxy_pass http://core_backend;
    }

    # API docs
    location /swagger-ui {
        proxy_pass http://core_backend;
    }

    location /v3/api-docs {
        proxy_pass http://core_backend;
    }
}

server {
    listen 80;
    server_name core-web.banquito.local web.banquito.local;
    client_max_body_size 100M;

    location / {
        proxy_pass http://core_banca_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name core-ventanilla.banquito.local ventanilla.banquito.local;
    client_max_body_size 100M;

    location / {
        proxy_pass http://core_ventanilla_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
